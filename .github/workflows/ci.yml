name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hot-demos
        uses: actions/checkout@v4

      - name: Install Hot
        uses: hot-dev/setup-hot@v1

      - name: Show Hot version
        run: hot version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: hot-chat/package-lock.json

      - name: Install hot-chat dependencies
        run: npm ci
        working-directory: hot-chat

      - name: Build hot-chat
        run: npm run build
        working-directory: hot-chat

      - name: Test my-news
        run: hot test
        working-directory: my-news

      - name: Test slack-bot
        run: hot test
        working-directory: slack-bot

      - name: Test hot-chat
        run: hot test
        working-directory: hot-chat

      - name: Test graph-rag-memory
        run: hot test
        working-directory: graph-rag-memory

